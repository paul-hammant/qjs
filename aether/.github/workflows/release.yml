name: Release

# Every merge to main creates a versioned release automatically.
#
# Version bump rules:
#   - Commit message starts with "major"  ->  bump MAJOR
#   - Anything else                       ->  bump MINOR (default)
#
# Manual tag push (v*.*.*) also triggers a build + publish.
#
# Flow (state-based, no commit message parsing):
#   1. Push to main → prepare job reads VERSION and checks if vX.Y.Z tag exists
#   2a. Tag EXISTS   → bump job computes next version, opens a release PR
#   2b. Tag MISSING  → tag job creates vX.Y.Z tag from HEAD
#   3. Tag push → build + publish jobs create the GitHub Release
#
# This is robust regardless of merge strategy (squash, merge commit, rebase).

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

# Serialize all release runs — prevents race conditions when multiple PRs
# merge in quick succession (second run queues until first completes).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ================================================================== #
  # PREPARE — decide whether to bump or tag based on repo state        #
  # ================================================================== #
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    # `pull-requests: read` lets the decide step query PR state via gh,
    # so we can distinguish an in-flight release PR (skip) from an
    # abandoned branch (delete + retry). `contents: write` is needed
    # to delete a stale release branch.
    permissions:
      contents: write
      pull-requests: read

    outputs:
      action:  ${{ steps.decide.outputs.action }}
      version: ${{ steps.decide.outputs.version }}
      tag:     ${{ steps.decide.outputs.tag }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Decide action
      id: decide
      env:
        COMMIT_MSG: ${{ github.event.head_commit.message }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION=$(cat VERSION | tr -d '[:space:]')
        TAG="v${VERSION}"

        if git rev-parse "$TAG" >/dev/null 2>&1; then
          # Tag exists for current VERSION → compute next version from latest tag
          # Use latest git tag (not VERSION file) to avoid stale-VERSION chains
          LATEST_TAG=$(git tag -l 'v*.*.*' --sort=-version:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="$TAG"
          fi
          OLD=$(echo "$LATEST_TAG" | sed 's/^v//')
          MAJOR=$(echo "$OLD" | cut -d. -f1)
          MINOR=$(echo "$OLD" | cut -d. -f2)

          if echo "$COMMIT_MSG" | grep -q "^major"; then
            NEW="$((MAJOR + 1)).0.0"
          else
            NEW="${MAJOR}.$((MINOR + 1)).0"
          fi

          NEW_TAG="v$NEW"
          BRANCH="release/v${NEW}"

          # If next tag also exists (idempotent), skip entirely
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists -- nothing to do"
            echo "action=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # If the branch exists, decide based on its PR state — not branch
          # existence alone. Previous logic skipped on branch existence,
          # which left the workflow permanently stuck whenever a release PR
          # was abandoned without being merged or closed.
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            PR_STATE=$(gh pr list --head "$BRANCH" --state all --json state --jq '.[0].state // ""' 2>/dev/null || echo "")

            case "$PR_STATE" in
              OPEN)
                echo "Release PR for $BRANCH is OPEN -- skipping (waiting on merge)"
                echo "action=skip" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              MERGED)
                # Should not normally hit here: a merged release PR would have
                # bumped VERSION on main, so the outer "tag exists" check
                # would have flipped us to action=tag. Treat as skip to be safe.
                echo "Release PR for $BRANCH is MERGED but VERSION not advanced -- skipping"
                echo "action=skip" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              CLOSED|"")
                # Closed without merging, or no PR was ever opened for the
                # branch — branch is stale. Delete it and fall through to
                # creating a fresh bump PR.
                echo "Release PR for $BRANCH is ${PR_STATE:-MISSING} -- deleting stale branch and re-bumping"
                git push origin --delete "$BRANCH" || true
                ;;
            esac
          fi

          echo "action=bump"      >> "$GITHUB_OUTPUT"
          echo "version=$NEW"     >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG"     >> "$GITHUB_OUTPUT"
          echo "Will bump: $OLD -> $NEW (latest tag: $LATEST_TAG)"
        else
          # No tag for current VERSION → this is a merged release PR, create tag
          echo "action=tag"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "Will tag: $TAG"
        fi

  # ================================================================== #
  # BUMP — open a version-bump PR                                      #
  # ================================================================== #
  bump:
    name: Auto-bump version
    needs: prepare
    if: needs.prepare.outputs.action == 'bump'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Create release PR
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ needs.prepare.outputs.version }}"
        BRANCH="release/v${VERSION}"

        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git checkout -b "$BRANCH"

        # Update VERSION file
        echo "$VERSION" > VERSION
        git add VERSION

        # Replace [current] with the actual version in CHANGELOG.md
        if grep -q '## \[current\]' CHANGELOG.md; then
          sed -i "s/## \[current\]/## [${VERSION}]/" CHANGELOG.md
          git add CHANGELOG.md
        fi

        # Only commit if there are staged changes
        if git diff --cached --quiet; then
          echo "No changes to commit -- skipping"
          exit 0
        fi

        git commit -m "chore: release ${VERSION}"
        git push origin "$BRANCH"

        gh pr create \
          --base main \
          --head "$BRANCH" \
          --title "chore: release ${VERSION}" \
          --body "Auto-generated version bump to **${VERSION}**.

        Merging this PR will trigger a tag + release build."

  # ================================================================== #
  # TAG — create git tag (release PR just merged)                      #
  # ================================================================== #
  tag:
    name: Tag release
    needs: prepare
    if: needs.prepare.outputs.action == 'tag'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      tag:     ${{ steps.t.outputs.tag }}
      version: ${{ steps.t.outputs.version }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Create and push tag
      id: t
      run: |
        VERSION="${{ needs.prepare.outputs.version }}"
        TAG="${{ needs.prepare.outputs.tag }}"

        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git tag "$TAG"
        git push origin "$TAG"

        echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Created tag $TAG"

  # ================================================================== #
  # BUILD -- all four platforms                                         #
  #                                                                    #
  # Runs when: tag job succeeds, or manual tag push.                   #
  # Checks out the exact release tag so binaries match VERSION.        #
  # ================================================================== #
  build:
    name: Build -- ${{ matrix.target }}
    needs: tag
    if: |
      always() && (
        (needs.tag.result == 'success' && needs.tag.outputs.tag != '') ||
        startsWith(github.ref, 'refs/tags/')
      )
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            ext: ""
          - os: macos-15-intel
            target: macos-x86_64
            ext: ""
          - os: macos-latest
            target: macos-arm64
            ext: ""
          - os: windows-latest
            target: windows-x86_64
            ext: ".exe"

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.tag.outputs.tag || github.ref }}
        fetch-tags: true

    # -- Linux ---
    - name: Setup (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install -y gcc make bc

    # -- Windows -- MinGW-w64 via MSYS2 ---
    - name: Setup (Windows)
      if: matrix.os == 'windows-latest'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        # zlib + openssl are baked into the Windows release binary so
        # std.zlib, std.cryptography, and std.net TLS work
        # out-of-the-box for downstream Windows users. Without them
        # AETHER_HAS_ZLIB / AETHER_HAS_OPENSSL stay undefined and the
        # shipped binary silently falls into the "unavailable" stubs.
        # ca-certificates ships /mingw64/etc/ssl/certs/ca-bundle.crt —
        # required for HTTPS in std.net (without it the OpenSSL handshake
        # completes but cert verification fails for lack of a trust
        # anchor on Windows). Mirrors ci.yml::ci-windows.
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-zlib
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-ca-certificates
          pkg-config
          make
          zip
          bc

    # -- Build + test: Linux / macOS ---
    - name: Build (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        make compiler
        make ae
        make stdlib

    - name: Test (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        make test
        make test-ae
        make test-install
        make test-release-archive

    - name: Strip (Unix)
      if: matrix.os != 'windows-latest'
      run: strip build/aetherc build/ae 2>/dev/null || true

    # -- Build + test: Windows (MSYS2 shell) ---
    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: |
        make compiler
        make ae
        make stdlib

    - name: Test (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      # The hardcoded `C:\msys64\...` probe in aether_http.c::load_windows_ca_bundle
      # doesn't match the GitHub runner's MSYS2 path (it's installed under a
      # temp dir, not C:\msys64). Export SSL_CERT_FILE explicitly using
      # cygpath -w so the first probe in get_ssl_ctx() hits regardless of
      # where MSYS2 lives on this runner. Without this, `tests/regression/
      # test_https_client.ae` fails with "certificate verify failed".
      # Mirrors ci.yml::ci-windows.
      run: |
        export SSL_CERT_FILE="$(cygpath -w /mingw64/etc/ssl/certs/ca-bundle.crt)"
        echo "SSL_CERT_FILE=$SSL_CERT_FILE"
        ls -la "$(cygpath -u "$SSL_CERT_FILE")"
        make test
        make test-ae
        make test-install
        make test-release-archive

    - name: Strip (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: strip build/aetherc.exe build/ae.exe 2>/dev/null || true

    # -- Package: Unix ---
    - name: Package (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        VERSION=$(cat VERSION | tr -d '[:space:]')
        mkdir -p release/bin release/lib release/share/aether release/include/aether
        cp build/aetherc release/bin/
        cp build/ae      release/bin/
        chmod 755 release/bin/*
        if [ -f build/libaether.a ]; then
          cp build/libaether.a release/lib/
        fi
        # Headers (preserve directory structure — must match install.sh)
        for dir in runtime runtime/actors runtime/scheduler runtime/utils \
                   runtime/memory runtime/config std std/string std/io std/math \
                   std/net std/collections std/json std/fs std/log std/http \
                   std/file std/dir std/path std/tcp std/list std/map std/os; do
          if [ -d "$dir" ]; then
            mkdir -p "release/include/aether/$dir"
            cp "$dir"/*.h "release/include/aether/$dir/" 2>/dev/null || true
          fi
        done
        # Runtime source (fallback for linking without libaether.a)
        cp -r runtime release/share/aether/
        cp -r std     release/share/aether/
        cp LICENSE README.md VERSION release/
        cd release && tar -czf ../aether-${VERSION}-${{ matrix.target }}.tar.gz *

    # -- Package: Windows (MSYS2 shell) ---
    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: |
        VERSION=$(cat VERSION | tr -d '[:space:]')
        mkdir -p release/bin release/lib release/share/aether release/include/aether
        cp build/aetherc.exe release/bin/
        cp build/ae.exe      release/bin/
        if [ -f build/libaether.a ]; then
          cp build/libaether.a release/lib/
        fi
        # Headers (preserve directory structure — must match install.sh)
        for dir in runtime runtime/actors runtime/scheduler runtime/utils \
                   runtime/memory runtime/config std std/string std/io std/math \
                   std/net std/collections std/json std/fs std/log std/http \
                   std/file std/dir std/path std/tcp std/list std/map std/os; do
          if [ -d "$dir" ]; then
            mkdir -p "release/include/aether/$dir"
            cp "$dir"/*.h "release/include/aether/$dir/" 2>/dev/null || true
          fi
        done
        # Runtime source (fallback for linking without libaether.a)
        cp -r runtime release/share/aether/
        cp -r std     release/share/aether/
        cp LICENSE README.md VERSION release/
        cd release && zip -r ../aether-${VERSION}-${{ matrix.target }}.zip *

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aether-${{ matrix.target }}
        path: |
          aether-*-${{ matrix.target }}.tar.gz
          aether-*-${{ matrix.target }}.zip
        retention-days: 7

  # ================================================================== #
  # PUBLISH -- create or update the GitHub Release                      #
  # ================================================================== #
  publish:
    name: Publish release
    needs: [tag, build]
    runs-on: ubuntu-latest
    if: |
      always() && needs.build.result == 'success' && (
        (needs.tag.result == 'success' && needs.tag.outputs.tag != '') ||
        startsWith(github.ref, 'refs/tags/')
      )

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.tag.outputs.tag || github.ref }}

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        merge-multiple: true

    - name: Resolve release tag
      id: tag
      run: |
        TAG="${{ needs.tag.outputs.tag }}"
        if [ -z "$TAG" ]; then
          TAG="${{ github.ref_name }}"
        fi
        VERSION=$(cat VERSION | tr -d '[:space:]')
        echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Build release body
      run: python3 .github/scripts/build_release_body.py ${{ steps.tag.outputs.version }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name:   ${{ steps.tag.outputs.tag }}
        name:       Aether ${{ steps.tag.outputs.version }}
        make_latest: true
        draft: false
        prerelease: ${{ contains(steps.tag.outputs.tag, 'alpha') || contains(steps.tag.outputs.tag, 'beta') || contains(steps.tag.outputs.tag, 'rc') }}
        body_path: /tmp/release_body.md
        files: |
          aether-*.tar.gz
          aether-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
