# Buildkite pipeline — runs alongside GitHub Actions, not instead of.                                                                                                                  
  #                                            
  # Self-hosted x86_64 Linux agent (podman container on a NUC),
  # registered in the Default cluster with tags `queue=default-queue,
  # aether=1`. Base image ships gcc, clang, valgrind, openssl, zlib,
  # sqlite, gtk4 (>=4.10) + xvfb (for contrib/aether_ui headless tests),
  # plus the contrib/host dev libs (lua, python, ruby, perl,
  # duktape, tcl, go). Rebuilding the image is a Dockerfile edit on
  # the NUC; don't need it for any step below.
  #                                                                                                                                                                                      
  # Windows + macOS stay on GHA — the self-hosted agent is Linux only.
                                                                                                                                                                                         
  steps:                                                          
    - label: ":hammer: Linux / GCC `make ci`"                                                                                                                                            
      command: make ci                                                                                                                                                                   
      agents:
        queue: "default-queue"                                                                                                                                                           
        aether: "1"                                               
      timeout_in_minutes: 30
      retry:                                                                                                                                                                             
        automatic:
          - exit_status: -1  # agent lost                                                                                                                                                
            limit: 1                                                                                                                                                                     
                                                                                                                                                                                         
    - label: ":clang: Linux / Clang `make ci`"                                                                                                                                           
      command: CC=clang make ci                                                                                                                                                          
      agents:                                                     
        queue: "default-queue"
        aether: "1"
      timeout_in_minutes: 30
      retry:                                                                                                                                                                             
        automatic:
          - exit_status: -1                                                                                                                                                              
            limit: 1                                                                                                                                                                                                              
   
    - label: ":recycle: Cooperative scheduler"                                                                                                                                           
      command: make ci-coop                                       
      agents:
        queue: "default-queue"
        aether: "1"                                                                                                                                                                      
      timeout_in_minutes: 15
      retry:                                                                                                                                                                             
        automatic:                                                
          - exit_status: -1
            limit: 1

    - label: ":link: contrib/host bridges"
      command: make contrib-host-check
      agents:
        queue: "default-queue"
        aether: "1"
      timeout_in_minutes: 15
      retry:
        automatic:
          - exit_status: -1
            limit: 1

    # ---- contrib/ per-package steps ----
    # contrib/host is already covered above. contrib/aether_ui,
    # contrib/aeocha, contrib/tinyweb, contrib/sqlite each get their
    # own broken-out step below. They're also exercised inside
    # `make ci` (contrib-aether-ui-check, the test-ae sweep, etc.)
    # but a per-contrib label means a regression in one shows up in
    # the BK UI as its own red tick rather than buried in the
    # `Linux / GCC make ci` waterfall — much easier to triage.

    - label: ":art: contrib/aether_ui (GTK4 + Xvfb)"
      # contrib/aether_ui's full pipeline: builds every example
      # against the GTK4 backend, smoke-launches the non-driver
      # examples (1.5s render-and-kill — catches widget-wiring
      # regressions), then drives example_calculator and
      # example_testable through the AetherUIDriver HTTP test server.
      #
      # ci.sh auto-wraps with `xvfb-run` when neither $DISPLAY nor
      # $WAYLAND_DISPLAY is set, which is the case inside the
      # buildkite-agent container. Requires gtk4 >= 4.10 (the
      # backend uses GtkAlertDialog/FileDialog/UriLauncher) and
      # xvfb in the image; both confirmed present.
      #
      # Requires `make compiler ae stdlib` so `./build/ae` exists
      # for the example builds. The widget-level C tests
      # (test_widgets.c) are run separately by `make ci` step [10/10]
      # under both Linux/GCC and Linux/Clang — no point repeating.
      #
      # AetherUIDriver binds port 9222 by default, distinct from
      # tinyweb's 8080 so no inter-step collision; ci.sh launches
      # multiple example apps that each bind 9222 in sequence with
      # clean shutdown between, so concurrency_group below prevents
      # a parallel aether_ui job from racing on the same port.
      command: |
        make compiler ae stdlib && \
        bash contrib/aether_ui/ci.sh
      agents:
        queue: "default-queue"
        aether: "1"
      concurrency: 1
      concurrency_group: "aether-ui-port-9222"
      timeout_in_minutes: 15
      retry:
        automatic:
          - exit_status: -1
            limit: 1

    - label: ":test_tube: contrib/aeocha self-test"
      command: |
        make compiler ae stdlib && \
        ./build/ae run contrib/aeocha/example_self_test.ae
      agents:
        queue: "default-queue"
        aether: "1"
      timeout_in_minutes: 10
      retry:
        automatic:
          - exit_status: -1
            limit: 1

    - label: ":spider_web: contrib/tinyweb compile + test"
      # All three test files bind port 8080. Buildkite serializes
      # jobs sharing a `concurrency_group` to `concurrency: 1`, so
      # parallel tinyweb jobs queue rather than collide on the
      # port. Worst case one tinyweb job waits ~10min for the
      # previous to finish; acceptable trade for actually exercising
      # the runtime path.
      #
      # Whitelist of files (the others — example_app/auth/
      # composition/sse/static/websocket.ae — reference `tinyweb.*`
      # symbols that module.ae does not currently export; tracked in
      # contrib/aeocha/TODO.md). example_inventory.ae is a DSL
      # structure demo that exits cleanly without binding.
      command: |
        make compiler ae stdlib && \
        for f in contrib/tinyweb/example_inventory.ae \
                 contrib/tinyweb/test_inventory.ae \
                 contrib/tinyweb/test_integration.ae \
                 contrib/tinyweb/test_spec.ae; do \
            printf "  %-50s " "$$f"; \
            if ./build/ae run "$$f" >/tmp/tw_run.out 2>&1; then \
                echo OK; \
            else \
                echo FAIL; \
                tail -10 /tmp/tw_run.out; \
                exit 1; \
            fi; \
        done
      agents:
        queue: "default-queue"
        aether: "1"
      concurrency: 1
      concurrency_group: "tinyweb-port-8080"
      timeout_in_minutes: 15
      retry:
        automatic:
          - exit_status: -1
            limit: 1

    - label: ":cloud: contrib/climate_http_tests (VCR replay)"
      # Servirtium-format record/replay against the WorldBank climate
      # API mirror. Three test files in this directory:
      #
      #   - test_climate_real.ae           — live network, NOT in CI
      #   - test_climate_via_vcr.ae        — replay-only, hand-written
      #                                       tape, fully offline
      #   - test_climate_record_then_replay.ae — auto record/replay;
      #                                       picks up the committed
      #                                       tape and replays
      #
      # The committed tape lives at contrib/climate_http_tests/tapes/
      # climate_5_endpoints.tape — byte-identical to what the recorder
      # produces against servirtium.github.io as of 2026-04-25. CI
      # exercises the replay path; local devs can rm the tape (or set
      # AETHER_VCR_RECORD=1) to drive the recorder against the live
      # mirror.
      #
      # Binds ports 18099 (via_vcr) + 18100 (record_then_replay). No
      # collision with tinyweb (8080) or aether_ui (9222).
      command: |
        make compiler ae stdlib && \
        ./build/ae run contrib/climate_http_tests/test_climate_via_vcr.ae && \
        ./build/ae run contrib/climate_http_tests/test_climate_record_then_replay.ae
      agents:
        queue: "default-queue"
        aether: "1"
      timeout_in_minutes: 10
      retry:
        automatic:
          - exit_status: -1
            limit: 1

    - label: ":package: contrib/sqlite roundtrip"
      # The sqlite roundtrip is already exercised via `make ci` →
      # `make test-ae` on the Linux/GCC and Linux/Clang steps. Broken
      # out here as its own label so a sqlite-specific regression
      # shows up in the BK UI without having to scan the full
      # test-ae output. Requires libsqlite3-dev in the agent image
      # (already present per the header comment).
      command: |
        make compiler ae stdlib && \
        bash tests/integration/sqlite_roundtrip/test_sqlite_roundtrip.sh
      agents:
        queue: "default-queue"
        aether: "1"
      timeout_in_minutes: 10
      retry:
        automatic:
          - exit_status: -1
            limit: 1
